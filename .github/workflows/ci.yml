name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (with wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Rust tests
        run: cargo test --manifest-path bench-engine/Cargo.toml

      - name: Build WASM bench engine
        run: wasm-pack build bench-engine --target web --out-dir pkg

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Unit tests
        run: npm test
