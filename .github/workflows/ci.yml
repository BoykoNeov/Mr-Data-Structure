name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (with wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Rust tests
        run: cargo test --manifest-path bench-engine/Cargo.toml

      - name: Build WASM bench engine
        run: wasm-pack build bench-engine --target web --out-dir pkg

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Unit tests
        run: npm test

      # Runtime gate: the ONLY proof the worker→WASM→Comlink path resolves at
      # runtime — a green `npm run build` does not (see CLAUDE.md, docs/PLAN.md R2).
      # Reuses the dist/ built above. NON-BLOCKING for now (continue-on-error): the
      # sweep asserts timing slope bands, which can flake on contended shared runners,
      # so we observe stability before making it required. Remove continue-on-error to
      # promote it to a hard gate once it proves stable.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Runtime browser gate (verify:browser)
        continue-on-error: true
        run: |
          npm run preview &
          PREVIEW_PID=$!
          # Wait (dependency-free) for the preview server to accept connections.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4173 >/dev/null; then break; fi
            sleep 1
          done
          # Retry the whole check up to 3× to absorb timing-band flake on shared runners.
          ok=0
          for attempt in 1 2 3; do
            echo "::group::verify:browser attempt $attempt"
            if node scripts/verify-browser.mjs http://localhost:4173; then
              ok=1; echo "::endgroup::"; break
            fi
            echo "::endgroup::"
            echo "attempt $attempt failed"
          done
          kill "$PREVIEW_PID" 2>/dev/null || true
          if [ "$ok" -ne 1 ]; then
            echo "browser gate failed after 3 attempts"
            exit 1
          fi
